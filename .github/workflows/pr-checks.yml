name: PR checks

on:
    pull_request:
        branches: [master]

jobs:
    build:
        name: Build smoke test
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: yarn

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Build
              run: yarn build
